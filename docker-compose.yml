version: '3.8'

services:
  app:
    build: .
    container_name: hrmanage_app
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      # DB 영속화 (호스트와 공유)
      - ./data:/app/data
      # 코드 hot-reload (호스트 변경 시 컨테이너 즉시 반영)
      - ./server:/app/server
      - ./public:/app/public
      - ./prisma:/app/prisma
      - ./scripts:/app/scripts
    environment:
      - PORT=3000
      - DATABASE_URL=file:/app/data/hrmanage.db
      - DB_PATH=/app/data/hrmanage.db
      - JWT_SECRET=synap-hr-local-dev-secret-2025
      - ENC_SECRET=synap-local-enc-secret-32bytes!!
      - TZ=Asia/Seoul
      - NODE_ENV=development
      - SQLITE_JOURNAL_MODE=DELETE  # Windows 바인드 마운트 호환 (SQLITE_IOERR_SHMOPEN 회피)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/notice"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── PostgreSQL 16 (로컬: --profile postgres / 운영 NCloud: profile 없음) ──
  postgres:
    image: postgres:16-alpine
    container_name: hrmanage-postgres
    profiles:
      - postgres          # 로컬 개발: docker compose --profile postgres up -d
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrmanage}
      POSTGRES_USER: ${POSTGRES_USER:-hrmanage_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev_password_2026}
      TZ: Asia/Seoul
    # 운영(NCloud)에서는 외부 포트 미노출 — 컨테이너 내부 네트워크만
    # ports:
    #   - "5432:5432"   # 로컬 테스트 시에만 주석 해제
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/postgres-backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hrmanage_user} -d ${POSTGRES_DB:-hrmanage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx 리버스 프록시 + TLS (운영 NCloud — INFRA-2D-1) ──
  # 로컬 개발에서는 사용하지 않음
  # 가동: docker compose --profile infra up -d nginx
  nginx:
    image: nginx:1.25-alpine
    container_name: hrmanage-nginx
    profiles:
      - infra
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - backend
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
    driver: local

version: '3.8'

services:
  app:
    build: .
    container_name: hrmanage_app
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      # DB 영속화 (호스트와 공유)
      - ./data:/app/data
      # 코드 hot-reload (호스트 변경 시 컨테이너 즉시 반영)
      - ./server:/app/server
      - ./public:/app/public
      - ./prisma:/app/prisma
      - ./scripts:/app/scripts
    environment:
      - PORT=3000
      - DATABASE_URL=file:/app/data/hrmanage.db
      - DB_PATH=/app/data/hrmanage.db
      - JWT_SECRET=synap-hr-local-dev-secret-2025
      - ENC_SECRET=synap-local-enc-secret-32bytes!!
      - TZ=Asia/Seoul
      - NODE_ENV=development
      - SQLITE_JOURNAL_MODE=DELETE  # Windows 바인드 마운트 호환 (SQLITE_IOERR_SHMOPEN 회피)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/notice"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── PostgreSQL 16 (운영 전환 준비 — PROMPT INFRA-2A-MIGRATE 시 활성화) ──
  # 현재 app은 better-sqlite3 직접 사용(286건), DB 레이어 전환 완료 후 가동
  # 가동: docker compose up -d postgres
  postgres:
    image: postgres:16-alpine
    container_name: hrmanage-postgres
    profiles:
      - postgres          # 기본 docker compose up 에서 제외 (명시적 --profile postgres 필요)
    restart: unless-stopped
    environment:
      POSTGRES_DB: hrmanage
      POSTGRES_USER: hrmanage_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev_password_2026}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/postgres-backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrmanage_user -d hrmanage"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
